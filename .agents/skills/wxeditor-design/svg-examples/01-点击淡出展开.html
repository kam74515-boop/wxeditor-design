<!-- 核心模式：点击淡出 + 展开 -->
<!-- 这是微信 SVG 动画最基础的模式 -->
<!-- 用途：点击封面图后淡出，露出下方隐藏内容 -->
<!-- 参数说明 -->
<!-- viewBox: 应匹配封面图宽高比（如 750x1000 = 3:4） -->
<!-- rect fill: 遮罩背景色，必须与文章背景色一致 -->
<!-- width to="300%": 展开倍数 = 内容总高度 / 封面高度 × 100%  -->
<!-- begin="click + 0.5s": 延迟必须 ≥ 淡出动画的 dur -->

<section style="text-align: center; margin: 0; box-sizing: border-box;">
  <section style="display: inline-block; width: 100%; overflow: hidden; box-sizing: border-box;">

    <!-- ▼ 内容面板：height:0 使其不占据布局高度，overflow:visible 使内容可见 -->
    <section style="height: 0px; overflow: visible; box-sizing: border-box;">
      <section style="display: flex; box-sizing: border-box;">
        <section style="width: 100%; box-sizing: border-box;">

          <!-- ★ 替换区域：这里放点击后显示的内容 -->
          <section style="line-height: 0; box-sizing: border-box;">
            <img src="https://placehold.co/750x1000/EEE/333?text=内容图1" 
                 style="width: 100%; height: auto; display: block; box-sizing: border-box;" />
          </section>
          <section style="line-height: 0; box-sizing: border-box;">
            <img src="https://placehold.co/750x1000/DDD/333?text=内容图2" 
                 style="width: 100%; height: auto; display: block; box-sizing: border-box;" />
          </section>

        </section>
      </section>
    </section>

    <!-- ▼ SVG 遮罩层 -->
    <section style="overflow: visible; box-sizing: border-box;">
      <section style="width: 100%; box-sizing: border-box;">
        <section style="pointer-events: none; box-sizing: border-box;">
          <svg width="100%" xmlns="http://www.w3.org/2000/svg"
               style="display: block; max-width: none !important; pointer-events: none; box-sizing: border-box;"
               viewBox="0 0 750 1000" opacity="1">

            <svg width="100%" height="100%">
              <!-- 纯色背景遮罩 -->
              <rect fill="#FFFFFF" width="100%" height="100%" x="0%" y="0%"></rect>

              <!-- 透明热区：接收点击 -->
              <rect style="pointer-events: auto; opacity: 0;" width="100%" height="100%">
                <animate from="0" to="0" dur="0" begin="click + 0.1s"
                         fill="freeze" attributeName="width"></animate>
              </rect>

              <!-- 封面图：通过 foreignObject + background-image 加载 -->
              <svg x="0%" y="0%" width="100%" height="100%">
                <foreignObject width="100%" height="100%">
                  <svg style="display: block; width: 100%;
                              background-size: cover; background-position: center;
                              background-repeat: no-repeat; pointer-events: none;
                              user-select: none;
                              background-image: url('https://placehold.co/750x1000/4A90D9/FFF?text=点击展开');"
                       viewBox="0 0 750 1000" xmlns="http://www.w3.org/2000/svg"></svg>
                </foreignObject>
              </svg>
            </svg>

            <!-- 动画1：淡出遮罩 -->
            <animate attributeName="opacity" from="1" to="0"
                     begin="click" dur="0.5s" fill="freeze" restart="never"></animate>
            <!-- 动画2：展开（撑开容器，露出内容面板） -->
            <animate attributeName="width" from="100%" to="300%"
                     begin="click + 0.5s" dur="2s" fill="freeze" restart="never"></animate>
          </svg>
        </section>
      </section>
    </section>

  </section>
</section>
