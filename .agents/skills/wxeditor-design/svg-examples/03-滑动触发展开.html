<!-- 核心模式：滑动触发淡出 + 展开 -->
<!-- 用途：用户在封面上滑动（touchmove），触发淡出和展开 -->
<!-- 与点击模式的区别：begin="touchmove" 替代 begin="click" -->
<!-- 滑动热区使用 animateMotion 提供物理反馈（按钮位移） -->

<section style="text-align: center; margin: 0; box-sizing: border-box;">
  <section style="display: inline-block; width: 100%; overflow: hidden; box-sizing: border-box;">
    <section style="height: 0px; overflow: visible; box-sizing: border-box;">
      <section style="display: flex; box-sizing: border-box;">
        <section style="width: 100%; box-sizing: border-box;">
          <section style="line-height: 0; box-sizing: border-box;">
            <img src="https://placehold.co/750x1000/E1F5FE/333?text=滑动后显示的内容"
                 style="width: 100%; height: auto; display: block; box-sizing: border-box;" />
          </section>
        </section>
      </section>
    </section>
    <section style="overflow: visible; box-sizing: border-box;">
      <section style="width: 100%; box-sizing: border-box;">
        <section style="pointer-events: none; box-sizing: border-box;">
          <svg width="100%" xmlns="http://www.w3.org/2000/svg"
               style="display: block; max-width: none !important; pointer-events: none; box-sizing: border-box;"
               viewBox="0 0 750 1000" opacity="1">
            <svg width="100%" height="100%">
              <rect fill="#FFFFFF" width="100%" height="100%" x="0%" y="0%"></rect>

              <!-- 封面背景图 -->
              <svg x="0%" y="0%" width="100%" height="100%">
                <foreignObject width="100%" height="100%">
                  <svg style="display: block; width: 100%; background-size: cover; background-position: center;
                              background-repeat: no-repeat; pointer-events: none; user-select: none;
                              background-image: url('https://placehold.co/750x1000/009688/FFF?text=↕ 滑动此区域');"
                       viewBox="0 0 750 1000" xmlns="http://www.w3.org/2000/svg"></svg>
                </foreignObject>
              </svg>

              <!-- ▼ 滑动触发热区（带位移动画反馈） -->
              <g style="box-sizing: border-box;">
                <svg x="30%" y="85%" width="40%" height="10%">
                  <foreignObject width="100%" height="100%">
                    <svg style="display: block; width: 100%; background-size: cover;
                                background-position: center; pointer-events: painted;
                                background-image: url('https://placehold.co/300x80/FFF/009688?text=↕ 滑动解锁');"
                         viewBox="0 0 300 80" xmlns="http://www.w3.org/2000/svg"></svg>
                  </foreignObject>
                  <!-- 滑动热区 -->
                  <rect width="100%" height="100%" fill="transparent"
                        style="pointer-events: auto; box-sizing: border-box;"></rect>
                </svg>
                <!-- 滑动后按钮位移动画（提供物理反馈） -->
                <animateMotion fill="freeze" begin="touchmove" dur="1" restart="never"
                               path="M0 0 h200 l0 0 h20"></animateMotion>
              </g>
            </svg>

            <!-- 滑动后淡出 -->
            <animate attributeName="opacity" from="1" to="0"
                     begin="touchmove + 1.5s" dur="0.5s" fill="freeze" restart="never"></animate>
            <!-- 滑动后展开 -->
            <animate attributeName="width" from="100%" to="200%"
                     begin="touchmove + 2s" dur="2s" fill="freeze" restart="never"></animate>
          </svg>
        </section>
      </section>
    </section>
  </section>
</section>
