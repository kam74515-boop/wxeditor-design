                                        style="max-width: 100%; box-sizing: border-box;" height="101.20%" role="img">
                                        <foreignObject width="100%" height="100%" x="0%" y="0%"
                                            style="box-sizing: border-box;">
                                            <svg space="default"
                                                style="display: block; width: 100%; background-position: center center; background-repeat: no-repeat; background-size: cover; background-attachment: scroll; -webkit-tap-highlight-color: transparent; visibility: visible; pointer-events: none; background-image: url('https://cdn.jsdelivr.net/gh/kam74515-boop/pioneer-assets@main/images/poster_v2_04.png'); box-sizing: border-box; user-select: none;"
                                                viewBox="0 0 1760 2352" xmlns="http://www.w3.org/2000/svg"></svg>
                                        </foreignObject>
                                    </svg>
                                </svg>
                                <!-- 动画控制：点击后淡出 + 宽度扩大（撑开父容器显示内容） -->
                                <animate style="box-sizing: border-box;" fill="freeze" attributeName="opacity"
                                    begin="click" from="1" to="0" dur="0.1s" restart="never"></animate>
                                <animate style="box-sizing: border-box;" fill="freeze" attributeName="width"
                                    begin="click + 0.1s" dur="2s" restart="never" from="100%" to="300%"></animate>
                            </svg>
                        </section>
                    </section>
                </section>
            </section>

        </section>
    </section>



    <!-- 50px 空置区域 -->
    <section style="height: 50px; width: 100%; display: block; overflow: hidden; background-color: #000000;"></section>

    <!-- #03 整图 -->
    <section style="margin: 0; padding: 0; line-height: 0; font-size: 0;">
        <img src="https://cdn.jsdelivr.net/gh/kam74515-boop/pioneer-assets@main/images/export_section03_v2.png"
            style="width: 100%; height: auto; display: block;">
    </section>
