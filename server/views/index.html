<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>微信编辑器 - 项目管理</title>
  <meta name="description" content="微信公众号图文编辑器，支持多人协作和一键同步">
  <link rel="stylesheet" href="/public/style.css">
  <!-- Vue 2 CDN -->
  <script src="https://cdn.jsdelivr.net/npm/vue@2.7.16/dist/vue.min.js"></script>
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div id="app" class="layout-two-col" v-cloak>
    <!-- 左侧边栏 -->
    <aside class="sidebar">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
        <i data-lucide="layout" style="width:24px;height:24px;color:var(--text-primary);"></i>
        <h2 class="sidebar-title" style="margin:0;">项目管理</h2>
      </div>

      <!-- 导航菜单 -->
      <nav style="display:flex;flex-direction:column;gap:6px;">
        <button 
          class="nav-item" 
          :class="{ active: currentNav === 'all' }"
          @click="currentNav = 'all'"
        >
          <i data-lucide="layout-list" class="icon"></i>
          <span>全部项目</span>
        </button>
        <button 
          class="nav-item" 
          :class="{ active: currentNav === 'recent' }"
          @click="currentNav = 'recent'"
        >
          <i data-lucide="history" class="icon"></i>
          <span>最近使用</span>
        </button>
        <button 
          class="nav-item" 
          :class="{ active: currentNav === 'archived' }"
          @click="currentNav = 'archived'"
        >
          <i data-lucide="archive" class="icon"></i>
          <span>已归档</span>
        </button>
      </nav>

      <!-- 弹性占满 -->
      <div style="flex:1;"></div>

      <!-- 新建项目按钮 -->
      <button class="btn btn-primary btn-full" style="height:40px;" @click="showCreateModal = true">
        <i data-lucide="plus" class="icon"></i>
        <span>新建项目</span>
      </button>
    </aside>

    <!-- 主内容区 -->
    <main class="main-content">
      <!-- 顶栏 -->
      <header class="main-header">
        <h1 class="main-title">{{ navTitle }}</h1>
        <div class="header-actions">
          <!-- 搜索框 -->
          <div class="search-box" style="width:320px;">
            <i data-lucide="search" class="icon" style="color:var(--text-muted);flex-shrink:0;"></i>
            <input 
              type="text" 
              v-model="searchQuery" 
              placeholder="搜索项目名称/标签…"
              @input="debouncedSearch"
            >
          </div>
          <!-- 导入按钮 -->
          <button class="btn btn-secondary" style="height:40px;">
            <i data-lucide="upload" class="icon" style="color:var(--text-muted);"></i>
            <span>导入</span>
          </button>
          <!-- 新建按钮 -->
          <button class="btn btn-primary" style="height:40px;" @click="showCreateModal = true">
            <i data-lucide="plus" class="icon"></i>
            <span>新建项目</span>
          </button>
        </div>
      </header>

      <!-- 项目列表 -->
      <div style="flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;">
        <!-- 加载中 -->
        <div v-if="loading" class="empty-state">
          <div class="loading-spinner" style="width:24px;height:24px;"></div>
          <span class="empty-text">加载中…</span>
        </div>

        <!-- 空状态 -->
        <div v-else-if="filteredDocuments.length === 0" class="empty-state">
          <i data-lucide="file-box" style="width:48px;height:48px;opacity:0.3;margin-bottom:12px;"></i>
          <span class="empty-text">{{ searchQuery ? '没有找到匹配的项目' : '暂无项目，点击"新建项目"开始' }}</span>
        </div>

        <!-- 项目行 -->
        <div 
          v-for="doc in filteredDocuments" 
          :key="doc.id"
          class="project-row"
          @click="openDocument(doc)"
        >
          <div class="left">
            <div class="status-dot" :class="getStatusClass(doc)"></div>
            <span class="project-name">{{ doc.title }}</span>
            <span class="project-meta">· 最近：{{ formatTime(doc.updated_at) }}</span>
          </div>
          <div class="right">
            <span class="tag tag-yellow" v-if="doc.status === 'published'">已发布</span>
            <span class="tag tag-default" v-else>{{ statusText(doc.status) }}</span>
            <button 
              class="btn btn-icon btn-secondary" 
              @click.stop="showMenu(doc, $event)"
              :title="'更多操作'"
            >
              <i data-lucide="more-horizontal" style="width:14px;height:14px;"></i>
            </button>
          </div>
        </div>
      </div>
    </main>

    <!-- 新建项目弹窗 -->
    <div class="modal-overlay" v-if="showCreateModal" @click.self="showCreateModal = false">
      <div class="modal-box">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:24px;">
          <i data-lucide="edit-3" style="width:24px;height:24px;color:var(--yellow-accent);"></i>
          <h3 style="margin:0;">新建项目</h3>
        </div>
        <input 
          class="modal-input" 
          v-model="newDocTitle" 
          placeholder="请输入文档标题"
          @keyup.enter="createDocument"
          autofocus
        >
        <div class="modal-actions">
          <button class="btn btn-secondary" @click="showCreateModal = false">取消</button>
          <button class="btn btn-primary" @click="createDocument" :disabled="!newDocTitle.trim()">
            创建
          </button>
        </div>
      </div>
    </div>

    <!-- 右键/更多菜单 -->
    <div 
      v-if="menuDoc" 
      class="modal-overlay"
      style="background:transparent;backdrop-filter:none;"
      @click="menuDoc = null"
    >
      <div 
        class="modal-box" 
        style="min-width:160px;padding:8px;position:fixed;"
        :style="{ top: menuPos.y + 'px', left: menuPos.x + 'px' }"
        @click.stop
      >
        <button class="nav-item" @click="openDocument(menuDoc); menuDoc = null;">
          <i data-lucide="edit-3" class="icon"></i>
          <span>编辑</span>
        </button>
        <button class="nav-item" @click="archiveDocument(menuDoc)">
          <i data-lucide="archive" class="icon"></i>
          <span>归档</span>
        </button>
        <button class="nav-item" style="color:var(--red);" @click="deleteDocument(menuDoc)">
          <i data-lucide="trash-2" class="icon"></i>
          <span>删除</span>
        </button>
      </div>
    </div>

    <!-- Toast -->
    <transition name="fade">
      <div v-if="toast.show" class="toast" :class="'toast-' + toast.type">
        {{ toast.message }}
      </div>
    </transition>
  </div>

  <script>
    new Vue({
      el: '#app',
      data: {
        currentNav: 'all',
        documents: [],
        loading: false,
        searchQuery: '',
        showCreateModal: false,
        newDocTitle: '',
        menuDoc: null,
        menuPos: { x: 0, y: 0 },
        toast: { show: false, message: '', type: 'info' },
        searchTimer: null
      },
      computed: {
        navTitle() {
          const titles = { all: '全部项目', recent: '最近使用', archived: '已归档' };
          return titles[this.currentNav] || '全部项目';
        },
        filteredDocuments() {
          let docs = this.documents;

          // 按导航过滤
          if (this.currentNav === 'archived') {
            docs = docs.filter(d => d.status === 'archived');
          } else if (this.currentNav === 'recent') {
            // 最近7天
            const weekAgo = Date.now() - 7 * 24 * 60 * 60 * 1000;
            docs = docs.filter(d => new Date(d.updated_at).getTime() > weekAgo);
          } else {
            docs = docs.filter(d => d.status !== 'archived' && d.status !== 'deleted');
          }

          // 搜索过滤
          if (this.searchQuery.trim()) {
            const q = this.searchQuery.toLowerCase();
            docs = docs.filter(d => d.title.toLowerCase().includes(q));
          }

          return docs;
        }
      },
      mounted() {
        this.fetchDocuments();
        this.$nextTick(() => {
          if (window.lucide) lucide.createIcons();
        });
      },
      updated() {
        this.$nextTick(() => {
          if (window.lucide) lucide.createIcons();
        });
      },
      methods: {
        // 获取文档列表
        async fetchDocuments() {
          this.loading = true;
          try {
            const res = await fetch('/api/collab/documents?limit=100');
            const json = await res.json();
            if (json.success) {
              this.documents = json.data.list;
            }
          } catch (e) {
            console.error('获取文档失败:', e);
          } finally {
            this.loading = false;
          }
        },

        // 创建文档
        async createDocument() {
          const title = this.newDocTitle.trim();
          if (!title) return;

          try {
            const res = await fetch('/api/collab/documents', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ title })
            });
            const json = await res.json();
            if (json.success) {
              this.showCreateModal = false;
              this.newDocTitle = '';
              this.showToast('项目创建成功', 'success');
              // 直接跳转到编辑器
              window.location.href = '/editor/' + json.data.id;
            }
          } catch (e) {
            this.showToast('创建失败: ' + e.message, 'error');
          }
        },

        // 打开文档
        openDocument(doc) {
          window.location.href = '/editor/' + doc.id;
        },

        // 归档文档
        async archiveDocument(doc) {
          try {
            await fetch('/api/collab/documents/' + doc.id, {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ status: 'archived' })
            });
            this.menuDoc = null;
            this.showToast('已归档', 'success');
            this.fetchDocuments();
          } catch (e) {
            this.showToast('操作失败', 'error');
          }
        },

        // 删除文档
        async deleteDocument(doc) {
          if (!confirm('确定删除 "' + doc.title + '"？')) return;
          try {
            await fetch('/api/collab/documents/' + doc.id, { method: 'DELETE' });
            this.menuDoc = null;
            this.showToast('已删除', 'success');
            this.fetchDocuments();
          } catch (e) {
            this.showToast('删除失败', 'error');
          }
        },

        // 显示操作菜单
        showMenu(doc, event) {
          this.menuDoc = doc;
          this.menuPos = { x: event.clientX - 100, y: event.clientY + 8 };
        },

        // 防抖搜索
        debouncedSearch() {
          clearTimeout(this.searchTimer);
          this.searchTimer = setTimeout(() => {
            // 客户端搜索，不需要请求
          }, 200);
        },

        // 格式化时间
        formatTime(timeStr) {
          if (!timeStr) return '未知';
          const d = new Date(timeStr);
          const now = new Date();
          const diff = now - d;
          if (diff < 60000) return '刚刚';
          if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
          if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
          if (diff < 604800000) return Math.floor(diff / 86400000) + '天前';
          return d.toLocaleDateString('zh-CN');
        },

        // 状态样式
        getStatusClass(doc) {
          if (doc.status === 'published') return 'active';
          if (doc.status === 'draft') return 'draft';
          return 'inactive';
        },

        // 状态文本
        statusText(status) {
          const map = { draft: '草稿', published: '已发布', archived: '已归档' };
          return map[status] || status;
        },

        // Toast 提示
        showToast(message, type = 'info') {
          this.toast = { show: true, message, type };
          setTimeout(() => { this.toast.show = false; }, 2500);
        }
      }
    });
  </script>

  <style>
    /* Vue v-cloak */
    [v-cloak] { display: none !important; }
  </style>
</body>
</html>
